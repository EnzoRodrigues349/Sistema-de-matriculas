<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Matrículas</title>

<style>
*{
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  padding: 30px;
}

.container{
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h1{
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* 🔍 BUSCA */
.busca{
  margin-top: 20px;
}

.busca input{
  width: 100%;
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}

.busca input:focus{
  border-color: #4facfe;
  outline: none;
  box-shadow: 0 0 5px rgba(79,172,254,0.5);
}

/* FORM */
form{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

form input, form select{
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.3s;
}

form input:focus, form select:focus{
  border-color: #4facfe;
  outline: none;
  box-shadow: 0 0 5px rgba(79,172,254,0.5);
}

button{
  grid-column: span 2;
  padding: 12px;
  background: linear-gradient(135deg, #43e97b, #38f9d7);
  border: none;
  border-radius: 8px;
  color: #333;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover{
  transform: scale(1.03);
  opacity: 0.9;
}

/* TABELA */
table{
  width: 100%;
  margin-top: 25px;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 10px;
}

th{
  background: #4facfe;
  color: white;
  padding: 12px;
}

td{
  padding: 12px;
  text-align: left;
}

tr:nth-child(even){
  background: #f2f7ff;
}

tr:hover{
  background: #dff1ff;
}

/* STATUS */
.ativa{
  color: green;
  font-weight: bold;
}

.inativa{
  color: red;
  font-weight: bold;
}


/* 📱 RESPONSIVO */
@media (max-width: 768px){

  body{
    padding: 15px;
  }

  .container{
    padding: 15px;
  }

  h1{
    font-size: 22px;
  }

  /* FORM vira 1 coluna */
  form{
    grid-template-columns: 1fr;
  }

  button{
    grid-column: span 1;
  }

  /* tabela com scroll lateral */
  table{
    display: block;
    overflow-x: auto;
  }

  th, td{
    font-size: 14px;
    padding: 10px;
  }

}

</style>
</head>

<body>

<div class="container">

<h1>📚 Sistema de Matrículas</h1>

<form id="form">
  <input type="text" id="nome" placeholder="Nome do aluno">
  <input type="text" id="curso" placeholder="Curso">
  <input type="number" id="matricula" placeholder="Matrícula">

  <select id="ativa">
    <option value="true">Ativa</option>
    <option value="false">Inativa</option>
  </select>

  <button type="submit">Cadastrar</button>
</form>

<!-- 🔍 CAMPO DE BUSCA -->
<div class="busca">
  <input type="text" id="buscar" placeholder="Buscar aluno pelo nome...">
</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Curso</th>
<th>Matrícula</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabela">
<!-- JS preenche aqui -->
</tbody>
</table>

</div>

</body>
</html>

<script>

const alunos = [
{ id:1, nome:"Carlos Silva", curso:"Informática", matricula:1001, ativa:true },
{ id:2, nome:"Ana Souza", curso:"Administração", matricula:1002, ativa:false },
{ id:3, nome:"Pedro Lima", curso:"Enfermagem", matricula:1003, ativa:true },
{ id:4, nome:"Juliana Rocha", curso:"Informática", matricula:1004, ativa:true },
{ id:5, nome:"Marcos Oliveira", curso:"Administração", matricula:1005, ativa:false },

{ id:6, nome:"Fernanda Alves", curso:"Direito", matricula:1006, ativa:true },
{ id:7, nome:"Lucas Pereira", curso:"Engenharia", matricula:1007, ativa:true },
{ id:8, nome:"Camila Santos", curso:"Psicologia", matricula:1008, ativa:false },
{ id:9, nome:"Rafael Costa", curso:"Educação Física", matricula:1009, ativa:true },
{ id:10, nome:"Bruna Martins", curso:"Arquitetura", matricula:1010, ativa:true },

{ id:11, nome:"Gabriel Ferreira", curso:"Informática", matricula:1011, ativa:false },
{ id:12, nome:"Amanda Ribeiro", curso:"Enfermagem", matricula:1012, ativa:true },
{ id:13, nome:"Diego Carvalho", curso:"Administração", matricula:1013, ativa:true },
{ id:14, nome:"Patricia Gomes", curso:"Direito", matricula:1014, ativa:false },
{ id:15, nome:"Thiago Moreira", curso:"Engenharia", matricula:1015, ativa:true },

];

const aluno= document.getElementById("tabela")

function mostrarAluno(alunos){
    aluno.innerHTML=""
    alunos.forEach(pegar=> {   
    aluno.innerHTML+=`
        <tr> 
           <td>
            ${pegar.nome}
            
            </td>

            <td>
             ${pegar.curso}
            
            </td>

             <td>
             ${pegar.matricula}
            
            </td>

            <td>
             ${pegar.ativa? "ativa": "inativo"} 
            
            </td> 
            
        </tr>
    
    
    
    `

        
    });

}

mostrarAluno(alunos)

const form = document.getElementById("form");

form.addEventListener("submit", function(e){
    e.preventDefault()

    const nome= document.getElementById("nome").value
    const curso= document.getElementById("curso").value
    const matricula= Number(document.getElementById("matricula").value)
    const ativa = document.getElementById("ativa").value === "true";

       if(nome === "" || curso === "" || isNaN(matricula)){
        alert("Preencha corretamente!");
        return;
    }



    const novoAluno={
        nome: nome,
        curso: curso,
        matricula:matricula,
        ativa: ativa
    }

    alunos.push(novoAluno)
    mostrarAluno(alunos)
    form.reset()

});

const buscar= document.getElementById("buscar")

buscar.addEventListener("input", function(){
const texto = buscar.value.toLowerCase();

    const filtrados = alunos.filter(aluno => 
        aluno.nome.toLowerCase().includes(texto)
    );

    mostrarAluno(filtrados);
})


</script>



</body>
</html>
